name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 208.87.135.158
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/bce.turbo.net.au
            git pull origin main
            npm install
            npm run build
            pm2 restart bce-casestudies || pm2 start ecosystem.config.js
