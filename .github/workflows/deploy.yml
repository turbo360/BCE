name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 208.87.135.158
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export NVM_DIR="/root/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /var/www/bce.turbo.net.au
            git pull origin main
            npm install --production
            npm run build
            pm2 restart bce-casestudies || pm2 start npm --name "bce-casestudies" -- start
